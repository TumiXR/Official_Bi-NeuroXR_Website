<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7B5CFA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00D4FF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38BDF8;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Neural connection lines (background layer) -->
  <!-- Connections between nodes -->
  <line x1="50" y1="18" x2="25" y2="38" stroke="url(#glowGrad)" stroke-width="0.8" opacity="0.4"/>
  <line x1="50" y1="18" x2="50" y2="42" stroke="url(#glowGrad)" stroke-width="0.8" opacity="0.4"/>
  <line x1="50" y1="18" x2="75" y2="38" stroke="url(#glowGrad)" stroke-width="0.8" opacity="0.4"/>
  <line x1="25" y1="38" x2="50" y2="42" stroke="url(#glowGrad)" stroke-width="0.7" opacity="0.35"/>
  <line x1="75" y1="38" x2="50" y2="42" stroke="url(#glowGrad)" stroke-width="0.7" opacity="0.35"/>
  <line x1="25" y1="38" x2="18" y2="62" stroke="url(#glowGrad)" stroke-width="0.8" opacity="0.4"/>
  <line x1="75" y1="38" x2="82" y2="62" stroke="url(#glowGrad)" stroke-width="0.8" opacity="0.4"/>
  <line x1="50" y1="42" x2="18" y2="62" stroke="url(#glowGrad)" stroke-width="0.7" opacity="0.3"/>
  <line x1="50" y1="42" x2="82" y2="62" stroke="url(#glowGrad)" stroke-width="0.7" opacity="0.3"/>
  <line x1="50" y1="42" x2="35" y2="68" stroke="url(#glowGrad)" stroke-width="0.7" opacity="0.35"/>
  <line x1="50" y1="42" x2="65" y2="68" stroke="url(#glowGrad)" stroke-width="0.7" opacity="0.35"/>
  <line x1="18" y1="62" x2="35" y2="68" stroke="url(#glowGrad)" stroke-width="0.7" opacity="0.35"/>
  <line x1="82" y1="62" x2="65" y2="68" stroke="url(#glowGrad)" stroke-width="0.7" opacity="0.35"/>
  <line x1="35" y1="68" x2="50" y2="82" stroke="url(#glowGrad)" stroke-width="0.8" opacity="0.4"/>
  <line x1="65" y1="68" x2="50" y2="82" stroke="url(#glowGrad)" stroke-width="0.8" opacity="0.4"/>
  <line x1="18" y1="62" x2="50" y2="82" stroke="url(#glowGrad)" stroke-width="0.6" opacity="0.25"/>
  <line x1="82" y1="62" x2="50" y2="82" stroke="url(#glowGrad)" stroke-width="0.6" opacity="0.25"/>

  <!-- XR visor shape (bold futuristic visor outline) -->
  <path d="M20 47 Q20 36 32 34 L50 32 L68 34 Q80 36 80 47 L80 56 Q80 65 68 67 L58 68 Q54 75 50 75 Q46 75 42 68 L32 67 Q20 65 20 56 Z"
        fill="none" stroke="url(#glowGrad)" stroke-width="2.2" filter="url(#glow)" opacity="0.95"/>

  <!-- Inner visor lens left -->
  <path d="M26 50 Q26 43 33 42 L46 41 L46 60 L33 60 Q26 59 26 52 Z"
        fill="url(#glowGrad)" opacity="0.13"/>
  <path d="M26 50 Q26 43 33 42 L46 41 L46 60 L33 60 Q26 59 26 52 Z"
        fill="none" stroke="url(#nodeGrad)" stroke-width="0.9" opacity="0.6"/>

  <!-- Inner visor lens right -->
  <path d="M74 50 Q74 43 67 42 L54 41 L54 60 L67 60 Q74 59 74 52 Z"
        fill="url(#glowGrad)" opacity="0.13"/>
  <path d="M74 50 Q74 43 67 42 L54 41 L54 60 L67 60 Q74 59 74 52 Z"
        fill="none" stroke="url(#nodeGrad)" stroke-width="0.9" opacity="0.6"/>

  <!-- Bridge between lenses -->
  <line x1="46" y1="50" x2="54" y2="50" stroke="url(#glowGrad)" stroke-width="1.2" opacity="0.7"/>

  <!-- Neural nodes -->
  <!-- Top center -->
  <circle cx="50" cy="18" r="3" fill="url(#nodeGrad)" filter="url(#softglow)" opacity="0.95"/>
  <!-- Mid left -->
  <circle cx="25" cy="38" r="2.2" fill="url(#nodeGrad)" filter="url(#glow)" opacity="0.85"/>
  <!-- Mid right -->
  <circle cx="75" cy="38" r="2.2" fill="url(#nodeGrad)" filter="url(#glow)" opacity="0.85"/>
  <!-- Center -->
  <circle cx="50" cy="42" r="2.5" fill="url(#nodeGrad)" filter="url(#softglow)" opacity="0.9"/>
  <!-- Lower left outer -->
  <circle cx="18" cy="62" r="2" fill="url(#nodeGrad)" filter="url(#glow)" opacity="0.8"/>
  <!-- Lower right outer -->
  <circle cx="82" cy="62" r="2" fill="url(#nodeGrad)" filter="url(#glow)" opacity="0.8"/>
  <!-- Lower left inner -->
  <circle cx="35" cy="68" r="2.2" fill="url(#nodeGrad)" filter="url(#glow)" opacity="0.85"/>
  <!-- Lower right inner -->
  <circle cx="65" cy="68" r="2.2" fill="url(#nodeGrad)" filter="url(#glow)" opacity="0.85"/>
  <!-- Bottom center -->
  <circle cx="50" cy="82" r="3" fill="url(#nodeGrad)" filter="url(#softglow)" opacity="0.95"/>
</svg>
